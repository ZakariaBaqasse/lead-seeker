services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-leadseeker}
    ports:
      - "54320:5432"
    volumes:
      - leadseeker-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-leadseeker} -h localhost",
        ]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Kept in-repo so compose works out of the box.
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-root}@db:5432/${POSTGRES_DB:-leadseeker}}
      - API_SECRET_KEY=${API_SECRET_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GNEWS_API_KEY=${GNEWS_API_KEY:-}
      - PIPELINE_SCHEDULE_HOUR=${PIPELINE_SCHEDULE_HOUR:-6}
      - PIPELINE_SCHEDULE_MINUTE=${PIPELINE_SCHEDULE_MINUTE:-0}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://api:8000}
      - APP_PASSWORD=${APP_PASSWORD:-your-password-here}
      - API_SECRET_KEY=${API_SECRET_KEY:-your-api-secret-key-here}
      - PORT=${PORT:-5173}
    volumes:
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  leadseeker-data:
  frontend_node_modules:
